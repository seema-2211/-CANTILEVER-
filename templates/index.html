<!DOCTYPE html>
<html>
<head>
    <title>NLP Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>NLP Chatbot</h1>

<div id="chat-box"></div>

<input
    type="text"
    id="user-input"
    placeholder="Type a message..."
>

<button onclick="sendMessage()">
    Send
</button>

<script>

async function sendMessage() {

    const input =
        document.getElementById("user-input");

    const message = input.value;

    if (!message) return;

    const chatBox =
        document.getElementById("chat-box");

    chatBox.innerHTML +=
        "<p><b>You:</b> "
        + message +
        "</p>";

    input.value = "";

    const response =
        await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type":
                "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

    const data =
        await response.json();

    chatBox.innerHTML +=
        "<p><b>Bot:</b> "
        + data.response +
        "</p>";

    chatBox.scrollTop =
        chatBox.scrollHeight;
}

</script>

</body>
</html>
